<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="container py-4">
    <h1>Класи</h1>
    <a class="btn btn-primary mb-3" href="/admin/">Admin</a>
    <table class="table table-striped">
      <thead><tr><th>#</th><th>Name</th><th>Year</th><th>Actions</th></tr></thead>
      <tbody>
        {% for cls in classes %}
        <tr>
          <td>{{ forloop.counter }}</td>
          <td>{{ cls.name }}</td>
          <td>{{ cls.year_of_study }}</td>
          <td>
            <a class="btn btn-sm btn-outline-primary" href="{% url 'school:timetable' cls.id %}">View Timetable</a>
            <a class="btn btn-sm btn-outline-success" href="{% url 'school:schedule_new' cls.id %}">Add Lesson</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
 </html>
