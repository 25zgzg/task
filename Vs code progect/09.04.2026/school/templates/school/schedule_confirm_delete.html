<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Delete Lesson</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="container py-4">
    <h1>Delete Lesson</h1>
    <p>Are you sure you want to delete lesson: <strong>{{ object.subject.name }}</strong> on <strong>{{ object.day_of_week }}</strong> hour <strong>{{ object.hour_start }}</strong>?</p>
    <form method="post">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Yes, delete</button>
      <a class="btn btn-secondary" href="javascript:history.back()">Cancel</a>
    </form>
  </body>
 </html>
