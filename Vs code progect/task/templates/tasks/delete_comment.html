{% extends 'base.html' %}
{% block content %}
  <h2>Видалення коментаря</h2>
  <p>Ви впевнені, що хочете видалити цей коментар?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Так, видалити</button>
    <a href="javascript:history.back()" class="btn btn-secondary">Скасувати</a>
  </form>
{% endblock %}
